<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:0;
}

.contact-section{
    width:80%;
    max-width:900px;
    margin:80px auto;
}

h1{
    font-size:60px;
    color:#1f1f5c;
}

.form-row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

input,
textarea{
    width:100%;
    padding:18px;
    border:2px solid #d9d9d9;
    border-radius:30px;
    font-size:16px;
    outline:none;
}

textarea{
    height:140px;
    resize:none;
    border-radius:25px;
}

button{
    background:#2d5bff;
    color:white;
    border:none;
    padding:15px 40px;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
@media (max-width: 768px) {
  body{
    font-size: 14px;
  }

  /* ===== الهيدر ===== */
  .top-header{
    flex-direction: row;
    padding: 15px 20px;
    height: auto;
  }

  .center-header{
    text-align: center;
  }

  .logo{
    width: 140px;
  }

  /* ===== صفحة المنتج ===== */
  .product-page{
    width: 100%;
    flex-direction: column;
    padding: 20px;
    gap: 20px;
  }

  .product-image img{
    height: auto;
  }

  .product-info h1{
    font-size: 28px;
  }

  .cart-btn,
  .buy-btn{
    width: 100%;
  }

  /* ===== السلة ===== */
  .cart-sidebar{
    width: 100%;
    right: -100%;
  }

  .cart-sidebar.active{
    right: 0;
  }

  /* ===== checkout modal ===== */
  #checkout-modal{
    width: 95%;
    margin: 20px auto;
  }

  /* ===== الأزرار ===== */
  button{
    font-size: 14px;
  }
}
@media (max-width: 768px) {
  .search-icon,
  .cart-icon {
    font-size: 20px;
  }

  .main-nav {
    gap: 10px;
  }

  .main-nav a {
    font-size: 12px;
  }
}

</style>

</head>
<body>

<div class="contact-section">

<h1>Contact</h1>

<div class="form-row">
    <input type="text" placeholder="Nom">
    <input type="email" placeholder="E-mail *">
</div>

<input type="text" placeholder="Numéro de téléphone">

<br><br>

<textarea placeholder="Commentaire"></textarea>

<br><br>

<button>Envoyer</button>

</div>

</body>
</html>
