<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#fafafa;
  color:#222;
}
body {
  padding-top: 80px; /* حسب ارتفاع الهيدر */
}

header{
  background:white;
  text-align:center;
  padding:18px 0 25px;
  border-bottom:1px solid #eee;
}
 header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background-color: white; /* مهم حتى لا يصبح شفاف */
}

.logo{
  width:200px;
}

nav{
  margin-top:15px;
}

nav a{
  margin:0 15px;
  color:#222;
  text-decoration:none;
  font-size:15px;
}

nav a:hover{
  text-decoration:underline;
}

.catalogue{
  width:78%;
  margin:45px auto;
}

h1{
  font-size:42px;
  margin-bottom:35px;
}

.top-filter{
  display:flex;
  align-items:center;
  gap:22px;
  margin-bottom:20px;
  font-size:15px;
}

.filter-btn{
  background:none;
  border:none;
  font-size:15px;
  cursor:pointer;
}

.filter-box{
  position:relative;
}

.dropdown{
  display:none;
  position:absolute;
  top:32px;
  left:0;
  width:340px;
  background:white;
  border:1px solid #ddd;
  padding:20px;
  z-index:999;
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.dropdown.active{
  display:block;
}

.dropdown p{
  margin:0 0 15px;
  font-size:15px;
}

.dropdown hr{
  border:none;
  border-top:1px solid #ddd;
  margin:15px 0;
}

.price-inputs{
  display:flex;
  gap:15px;
}

.price-inputs input{
  width:120px;
  padding:13px;
  border:1px solid #aaa;
  border-radius:25px;
  font-size:15px;
}

.small-btn{
  margin-top:18px;
  padding:8px 15px;
  border:1px solid #aaa;
  background:white;
  cursor:pointer;
}

.sort-area{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:10px;
}

select{
  padding:12px;
  width:300px;
  border:1px solid #333;
  background:white;
  font-size:15px;
}

#count{
  margin-left:15px;
  font-size:15px;
}

.chips{
  display:flex;
  align-items:center;
  gap:15px;
  margin:18px 0 25px;
}

.chip{
  border:1px solid #ddd;
  border-radius:25px;
  padding:10px 20px;
  background:white;
  font-size:15px;
}

.chip button{
  border:none;
  background:none;
  font-size:17px;
  cursor:pointer;
}

.clear-all{
  color:#222;
  text-decoration:underline;
  cursor:pointer;
  font-size:15px;
}

.products{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:25px;
}

.product-card{
  background:white;
  border:1px solid #ddd;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
  min-height:380px;
}

.product-card img{
  width:100%;
  height:260px;
  object-fit:cover;
  display:block;
  background:#f5f5f5;
}

.product-card h3{
  padding:10px 15px 0;
  font-size:13px;
  line-height:18px;
  min-height:40px;
}

.product-card p{
  padding:0 15px 15px;
  font-size:14px;
  font-weight:bold;
}

.product-card h3{
  font-size:15px;
  margin:12px 0 8px;
  text-transform:uppercase;
}

.product-card p{
  font-size:15px;
  color:#8b5e34;
  font-weight:bold;
  margin:0 0 10px;
}
.image-box{
  width:100%;
  height:260px;
  background:#f5f5f5;
  display:flex;
  align-items:center;
  justify-content:center;
}
.image-box img{
  width:50%;
  height:260px;
  object-fit:cover;
  display:block;
}
/* HEADER RESPONSIVE */

.phone-header{
    display:none;
}


.desktop-header{
    display:block;
}


@media (max-width:600px){

    .desktop-header{
        display:none;
    }

    .phone-header{
        display:block;
        background:white;
        border-bottom:1px solid #eee;
        position:sticky;
        top:0;
        z-index:1000;
    }


    .phone-bar{
        height:150px;
        display:flex;
        align-items:center;
        justify-content:center;
        position:relative;
    }


    .phone-logo{
        width:130px;
    }


    .phone-menu{
        position:absolute;
        left:25px;
        top:55px;
        background:none;
        border:none;
        font-size:32px;
    }


    .phone-nav{
        display:none;
        flex-direction:column;
    }


    .phone-nav.active{
        display:flex;
    }


    .phone-nav a{
        padding:20px;
        font-size:22px;
        text-decoration:none;
        color:#222;
        border-top:1px solid #eee;
    }

}
</style>
</head>

<body>

<!-- HEADER DESKTOP -->
<header class="desktop-header">

<img src="banner and logo/Gemini_Generated_Image_9c35ot9c35ot9c35.gif" class="logo">

<nav>
<a href="index.html">Accueil</a>
<a href="catalogue.html">Catalogue</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<!-- HEADER MOBILE -->
<header class="phone-header">

<div class="phone-bar">

<button class="phone-menu" onclick="toggleMenu()">
☰
</button>


<img src="banner and logo/Gemini_Generated_Image_9c35ot9c35ot9c35.gif"
class="phone-logo">


</div>


<nav class="phone-nav" id="phoneNav">

<a href="index.html">Accueil</a>
<a href="catalogue.html">Catalogue</a>
<a href="contact.html">Contact</a>

</nav>

</header>

<section class="catalogue">

<h1>Produits</h1>

<div class="top-filter">

  <span>Filtre :</span>

  <div class="filter-box">
    <button class="filter-btn" onclick="toggleDropdown('stockMenu')">Disponibilité ˅</button>

    <div class="dropdown" id="stockMenu">
      <p><strong>0 sélectionné</strong></p>
      <hr>
      <label>
        <input type="checkbox" checked onchange="filterProducts()">
        En stock <span id="stockNumber">(56)</span>
      </label>
    </div>
  </div>

  <div class="filter-box">
    <button class="filter-btn" onclick="toggleDropdown('priceMenu')">Prix ˅</button>

    <div class="dropdown" id="priceMenu">
      <p>Le prix le plus élevé est de <strong>600.00 dh</strong></p>
      <hr>

      <div class="price-inputs">
        <input type="number" id="minPrice" placeholder="De">
        <input type="number" id="maxPrice" placeholder="À">
      </div>

      <button class="small-btn" onclick="filterProducts()">Appliquer</button>
      <button class="small-btn" onclick="resetPrice()">Réinitialiser</button>
    </div>
  </div>

  <div class="sort-area">
    <span>Trier par :</span>

    <select id="sortSelect" onchange="filterProducts()">
      <option value="az">Alphabétique, de A à Z</option>
      <option value="za">Alphabétique, de Z à A</option>
      <option value="low">Prix: faible à élevé</option>
      <option value="high">Prix: élevé à faible</option>
      <option value="best">Meilleures ventes</option>
      <option value="new">Date, de la plus récente à la plus ancienne</option>
      <option value="old">Date, de la plus ancienne à la plus récente</option>
    </select>

    <span id="count">56 produits</span>
  </div>

</div>

<div class="chips" id="chips"></div>

<div class="products" id="products"></div>

</section>
<script>
let products = [];
async function loadProducts(){

  try {

    const response = await fetch("https://authenticparfum2-production.up.railway.app/api/products");

    const data = await response.json();

    products = data
.filter(product => product.name.toLowerCase() !== "test parfum")
.map(product => ({
      name: product.name,
      price: Number(product.price),
      image: product.image_url || product.image,
      link: product.link, 
      quantity: 1
    }));

    const container = document.getElementById("products");

    container.innerHTML = "";
products.sort((a,b)=>{
    const numA = Number(a.link.match(/\d+/)[0]);
    const numB = Number(b.link.match(/\d+/)[0]);
    return numA - numB;
});
  displayProducts(products);

  } catch(error){
    console.log(error);
  }

}

loadProducts();

function toggleDropdown(id){
  document.querySelectorAll(".dropdown").forEach(menu => {
    if(menu.id !== id){
      menu.classList.remove("active");
    }
  });

  document.getElementById(id).classList.toggle("active");
}

document.addEventListener("click", function(e){
  if(!e.target.closest(".filter-box")){
    document.querySelectorAll(".dropdown").forEach(menu => {
      menu.classList.remove("active");
    });
  }
});
function displayProducts(list){

    list.sort((a,b)=> a.id - b.id);

    const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(product => {
    container.innerHTML += `
      <div class="product-card" onclick="window.location.href='${product.link}'">
        <div class="image-box">
  <img src="${product.image}" alt="${product.name}">
</div>
        <h3>${product.name}</h3>
        <p>${product.price}.00 dh</p>
      </div>
    `;
  });

  document.getElementById("count").innerText =
    list.length + " produits sur " + products.length;

  document.getElementById("stockNumber").innerText =
    "(" + list.length + ")";
}

function filterProducts(){
  let min = Number(document.getElementById("minPrice").value) || 0;
  let max = Number(document.getElementById("maxPrice").value) || 600;
  let sort = document.getElementById("sortSelect").value;
  if(!sort){
    displayProducts(products);
    return;
}

  let filtered = products.filter(product => {
    return product.price >= min && product.price <= max;
  });

  if(sort === "az"){
    filtered.sort((a,b) => a.name.localeCompare(b.name));
  }

  if(sort === "za"){
    filtered.sort((a,b) => b.name.localeCompare(a.name));
  }

  if(sort === "low"){
    filtered.sort((a,b) => a.price - b.price);
  }

  if(sort === "high"){
    filtered.sort((a,b) => b.price - a.price);
  }

  displayProducts(filtered);
  showChips(min, max);
}

function showChips(min, max){
  const chips = document.getElementById("chips");
  chips.innerHTML = "";

  if(min > 0 || max < 600){
    chips.innerHTML = `
      <div class="chip">
        ${min}.00 dh - ${max}.00 dh
        <button onclick="resetPrice()">×</button>
      </div>

      <span class="clear-all" onclick="resetPrice()">Tout supprimer</span>
    `;
  }
}

function resetPrice(){
  document.getElementById("minPrice").value = "";
  document.getElementById("maxPrice").value = "";

  document.getElementById("chips").innerHTML = "";

  displayProducts(products);
}
function toggleMenu(){

document
.getElementById("phoneNav")
.classList.toggle("active");

}
</script>

</body>
</html>
