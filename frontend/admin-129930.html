<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin - Commandes</title>

<style>
body{
    font-family: Arial, sans-serif;
    padding:30px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

table{
    width:100%;
    background:white;
    border-collapse:collapse;
    margin-top:30px;
}

th,td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

th{
    background:#222;
    color:white;
}

.status{
    padding:5px 10px;
    border-radius:5px;
}
.modal {
    display:none;
    position:fixed;
    z-index:1000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.modal-content {
    background:white;
    margin:10% auto;
    padding:25px;
    width:400px;
    border-radius:10px;
    box-shadow:0 0 20px #333;
}

.close {
    float:right;
    font-size:25px;
    cursor:pointer;
}
.dashboard{
    display:flex;
    gap:20px;
    margin:30px 0;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    background:#111;
    color:white;
    width:180px;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.card h3{
    font-size:16px;
}

.card p{
    font-size:25px;
    font-weight:bold;
}
</style>

</head>

<body>

<h1>Gestion des commandes</h1>
<div class="dashboard">
    <div style="width:80%; margin:40px auto;">
    <canvas id="salesChart"></canvas>
</div>
<div style="width:400px; margin:40px auto;">
    <canvas id="statusChart"></canvas>
</div>

    <div class="card">
        <h3>Total ventes</h3>
        <p id="totalSales">0 DH</p>
    </div>

    <div class="card">
        <h3>Total commandes</h3>
        <p id="totalOrders">0</p>
    </div>

    <div class="card">
        <h3>Nouvelles</h3>
        <p id="newOrders">0</p>
    </div>

    <div class="card">
        <h3>Livrées</h3>
        <p id="deliveredOrders">0</p>
    </div>

    <div class="card">
        <h3>Annulées</h3>
        <p id="cancelledOrders">0</p>
    </div>

</div>
<input 
type="text" 
id="searchInput" 
placeholder="Rechercher un client, téléphone ou ville..."
onkeyup="searchOrders()"
>
<select id="statusFilter" onchange="filterStatus()">
    <option value="">Tous les statuts</option>
    <option value="new">New</option>
    <option value="confirmed">Confirmed</option>
    <option value="shipped">Shipped</option>
    <option value="delivered">Delivered</option>
    <option value="cancelled">Cancelled</option>
</select>
<table>
<thead>
<tr>
<th>ID</th>
<th>Client</th>
<th>Téléphone</th>
<th>Ville</th>
<th>Total</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="orders">
</tbody>

</table>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let allOrders = [];
let currentStatus = "";
async function showOrder(id){

const response = await fetch(`https://authenticparfum2-production.up.railway.app/api/orders/${id}`);

const order = await response.json();
allOrders = orders;


let products = "";

order.cart.forEach(item=>{

products += `
<div>
<b>${item.name}</b>
<br>
${item.price} DH × ${item.quantity}
</div>
<hr>
`;

});


document.getElementById("details").innerHTML = `

<h2>Commande #${order.id}</h2>

<p><b>Client:</b> ${order.name}</p>

<p><b>Téléphone:</b> ${order.phone}</p>

<p><b>Ville:</b> ${order.city}</p>


<h3>Produits:</h3>

${products}


<h3>Total: ${order.total} DH</h3>


<button onclick="closeDetails()">
Fermer
</button>

`;

document.getElementById("detailsBox").style.display="block";

}


function closeDetails(){

document.getElementById("detailsBox").style.display="none";

}
async function deleteOrder(id){

    if(!confirm("Supprimer cette commande ?")){
        return;
    }

    const response = await fetch(
        `https://authenticparfum2-production.up.railway.app/api/orders/${id}`,
        {
            method:"DELETE"
        }
    );

    const result = await response.json();

    if(result.success){

        alert("Commande supprimée");

        loadOrders();

    }else{

        alert("Erreur suppression");

    }
}

async function loadOrders(){

    const response = awaitfetch("https://authenticparfum2-production.up.railway.app/api/orders");

    const orders = await response.json();

    allOrders = orders;
    function updateDashboard(){

    let totalSales = 0;
    let newCount = 0;
    let deliveredCount = 0;
    let cancelledCount = 0;


    allOrders.forEach(order=>{

        totalSales += Number(order.total);


        if(order.status === "new"){
            newCount++;
        }

        if(order.status === "delivered"){
            deliveredCount++;
        }

        if(order.status === "cancelled"){
            cancelledCount++;
        }

    });
    createSalesChart();
    createStatusChart();


    document.getElementById("totalSales").innerHTML =
    totalSales + " DH";

    document.getElementById("totalOrders").innerHTML =
    allOrders.length;

    document.getElementById("newOrders").innerHTML =
    newCount;

    document.getElementById("deliveredOrders").innerHTML =
    deliveredCount;

    document.getElementById("cancelledOrders").innerHTML =
    cancelledCount;

}
renderOrders();
function createSalesChart(){

    let labels = [];
    let values = [];

    allOrders.forEach(order=>{

        labels.push(order.created_at.split("T")[0]);
        values.push(Number(order.total));

    });


    new Chart(
        document.getElementById("salesChart"),
        {
            type:"bar",

            data:{
                labels:labels,

                datasets:[{
                    label:"Ventes DH",
                    data:values
                }]
            },

            options:{
                responsive:true
            }
        }
    );
}
function createStatusChart(){

    let statusCount = {
        New: 0,
        Confirmed: 0,
        Delivered: 0,
        Cancelled: 0
    };

    allOrders.forEach(order => {
        if(statusCount[order.status] !== undefined){
            statusCount[order.status]++;
        }
    });


    new Chart(
        document.getElementById("statusChart"),
        {
            type:"doughnut",

            data:{
                labels:[
                    "New",
                    "Confirmed",
                    "Delivered",
                    "Cancelled"
                ],

                datasets:[{
                    label:"Status",
                    data:[
                        statusCount.New,
                        statusCount.Confirmed,
                        statusCount.Delivered,
                        statusCount.Cancelled
                    ]
                }]
            }
        }
    );

}
updateDashboard();

    const container = document.getElementById("orders");

    container.innerHTML = "";

    orders.forEach(order => {

      container.innerHTML += `
<tr>
    <td>${order.id}</td>
    <td>${order.name}</td>
    <td>${order.phone}</td>
    <td>${order.city}</td>
    <td>${order.total} DH</td>

    <td>
        <select id="status-${order.id}">
            <option value="new"
                ${order.status === "new" ? "selected" : ""}>
                New
            </option>

            <option value="confirmed"
                ${order.status === "confirmed" ? "selected" : ""}>
                Confirmed
            </option>

            <option value="shipped"
                ${order.status === "shipped" ? "selected" : ""}>
                Shipped
            </option>

            <option value="delivered"
                ${order.status === "delivered" ? "selected" : ""}>
                Delivered
            </option>

            <option value="cancelled"
                ${order.status === "cancelled" ? "selected" : ""}>
                Cancelled
            </option>
        </select>

        <button type="button" onclick="updateStatus(${order.id})">
            Update
        </button>
    </td>

    <td>${order.created_at}</td>

    <td>
        <button type="button" onclick="showOrder(${order.id})">
    Voir
</button>

<button type="button" onclick="deleteOrder(${order.id})">
    Supprimer
</button>
    </td>
</tr>
`;
           

    });

}
loadOrders();
async function showOrder(id){

const response = await fetch(
`https://authenticparfum2-production.up.railway.app/api/orders/${id}`
);

const order = await response.json();


let details = "";

order.cart.forEach(item=>{

details += 
`\n${item.name} - ${item.price} DH x ${item.quantity}`;

});


document.getElementById("orderDetails").innerHTML = `
<h3>Client : ${order.name}</h3>

<p>Téléphone : ${order.phone}</p>

<p>Ville : ${order.city}</p>

<h4>Produits :</h4>

${order.cart.map(item => 
`
<p>${item.name} - ${item.price} DH x ${item.quantity}</p>
`
).join("")}

<hr>

<h3>Total : ${order.total} DH</h3>
`;

document.getElementById("orderModal").style.display="block";

}
function closeModal(){
    document.getElementById("orderModal").style.display="none";
}
async function updateStatus(id){

    console.log("ORDER ID =", id);

    if(!id){
        alert("No order id");
        return;
    }

    const status = document.getElementById(`status-${id}`).value;

    const response = await fetch(
        `https://authenticparfum2-production.up.railway.app/api/orders/${id}/status`,
        {
            method:"PUT",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                status:status
            })
        }
    );

    const data = await response.json();

    console.log(data);

    if(data.success){
        alert("Status updated");
        loadOrders();
    }
}
function searchOrders(){

    let input = document.getElementById("searchInput");
    let filter = input.value.toLowerCase();

    let rows = document.querySelectorAll("#orders tr");

    rows.forEach(row => {

        let text = row.innerText.toLowerCase();

        if(text.includes(filter)){
            row.style.display = "";
        }else{
            row.style.display = "none";
        }

    });

}
function renderOrders(){

    const container = document.getElementById("orders");

    container.innerHTML = "";

    allOrders.forEach(order => {

        if(
            currentStatus !== "" &&
            order.status.toLowerCase() !== currentStatus
        ){
            return;
        }

        container.innerHTML += `
        <tr>
            <td>${order.id}</td>
            <td>${order.name}</td>
            <td>${order.phone}</td>
            <td>${order.city}</td>
            <td>${order.total} DH</td>

            <td>
                <select id="status-${order.id}">
                    <option value="new" ${order.status==="new"?"selected":""}>New</option>
                    <option value="confirmed" ${order.status==="confirmed"?"selected":""}>Confirmed</option>
                    <option value="delivered" ${order.status==="delivered"?"selected":""}>Delivered</option>
                    <option value="cancelled" ${order.status==="cancelled"?"selected":""}>Cancelled</option>
                </select>

                <button onclick="updateStatus(${order.id})">
                Update
                </button>
            </td>

            <td>${order.created_at}</td>

            <td>
                <button onclick="showOrder(${order.id})">Voir</button>
                <button onclick="deleteOrder(${order.id})">Supprimer</button>
            </td>

        </tr>`;
    });
}
function filterStatus(){

    currentStatus = document
    .getElementById("statusFilter")
    .value
    .toLowerCase();

    renderOrders();
}
</script>

<div id="detailsBox" style="
display:none;
position:fixed;
top:20%;
left:50%;
transform:translateX(-50%);
background:white;
padding:30px;
border:1px solid #ccc;
width:400px;
z-index:999;
">

<div id="details"></div>

</div>
<div id="orderModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>

    <h2>Détails de la commande</h2>

    <div id="orderDetails"></div>
  </div>
</div>
</body>
</html>
