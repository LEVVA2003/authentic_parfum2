<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:0;
}

.contact-section{
    width:80%;
    max-width:900px;
    margin:80px auto;
}

h1{
    font-size:60px;
    color:#1f1f5c;
}

.form-row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

input,
textarea{
    width:100%;
    padding:18px;
    border:2px solid #d9d9d9;
    border-radius:30px;
    font-size:16px;
    outline:none;
}

textarea{
    height:140px;
    resize:none;
    border-radius:25px;
}

button{
    background:#2d5bff;
    color:white;
    border:none;
    padding:15px 40px;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
/* =========================
   MOBILE VERSION
========================= */

@media screen and (max-width: 768px) {

    body {
        width: 100%;
        overflow-x: hidden;
    }

    /* Logo + menu */
    header {
        padding: 15px;
        text-align: center;
    }

    nav {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
    }


    /* Catalogue products */
    .products,
    .product-grid,
    #products {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 10px;
    }


    .product-card {
        width: 100%;
        padding: 10px;
    }


    .product-card img {
        width: 100%;
        height: auto;
    }


    /* Product page */
    .product-container,
    .product-details {
        display: flex;
        flex-direction: column;
        align-items: center;
    }


    .product-container img,
    .product-details img {
        width: 90%;
    }


    /* Cart sidebar */
    .cart-sidebar {
        width: 100%;
        right: 0;
    }


    /* Form order */
    .order-form {
        width: 90%;
        margin: auto;
    }


    input,
    textarea,
    select,
    button {
        width: 100%;
        box-sizing: border-box;
    }


    /* Admin table */
    table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
    }

}

</style>

</head>
<body>

<div class="contact-section">

<h1>Contact</h1>

<div class="form-row">
    <input type="text" placeholder="Nom">
    <input type="email" placeholder="E-mail *">
</div>

<input type="text" placeholder="Numéro de téléphone">

<br><br>

<textarea placeholder="Commentaire"></textarea>

<br><br>

<button>Envoyer</button>

</div>

</body>
</html>
