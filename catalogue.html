<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#fafafa;
  color:#222;
}
body {
  padding-top: 80px; /* حسب ارتفاع الهيدر */
}

header{
  background:white;
  text-align:center;
  padding:18px 0 25px;
  border-bottom:1px solid #eee;
}
 header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background-color: white; /* مهم حتى لا يصبح شفاف */
}

.logo{
  width:200px;
}

nav{
  margin-top:15px;
}

nav a{
  margin:0 15px;
  color:#222;
  text-decoration:none;
  font-size:15px;
}

nav a:hover{
  text-decoration:underline;
}

.catalogue{
  width:78%;
  margin:45px auto;
}

h1{
  font-size:42px;
  margin-bottom:35px;
}

.top-filter{
  display:flex;
  align-items:center;
  gap:22px;
  margin-bottom:20px;
  font-size:15px;
}

.filter-btn{
  background:none;
  border:none;
  font-size:15px;
  cursor:pointer;
}

.filter-box{
  position:relative;
}

.dropdown{
  display:none;
  position:absolute;
  top:32px;
  left:0;
  width:340px;
  background:white;
  border:1px solid #ddd;
  padding:20px;
  z-index:999;
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.dropdown.active{
  display:block;
}

.dropdown p{
  margin:0 0 15px;
  font-size:15px;
}

.dropdown hr{
  border:none;
  border-top:1px solid #ddd;
  margin:15px 0;
}

.price-inputs{
  display:flex;
  gap:15px;
}

.price-inputs input{
  width:120px;
  padding:13px;
  border:1px solid #aaa;
  border-radius:25px;
  font-size:15px;
}

.small-btn{
  margin-top:18px;
  padding:8px 15px;
  border:1px solid #aaa;
  background:white;
  cursor:pointer;
}

.sort-area{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:10px;
}

select{
  padding:12px;
  width:300px;
  border:1px solid #333;
  background:white;
  font-size:15px;
}

#count{
  margin-left:15px;
  font-size:15px;
}

.chips{
  display:flex;
  align-items:center;
  gap:15px;
  margin:18px 0 25px;
}

.chip{
  border:1px solid #ddd;
  border-radius:25px;
  padding:10px 20px;
  background:white;
  font-size:15px;
}

.chip button{
  border:none;
  background:none;
  font-size:17px;
  cursor:pointer;
}

.clear-all{
  color:#222;
  text-decoration:underline;
  cursor:pointer;
  font-size:15px;
}

.products{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:25px;
}

.product-card{
  background:white;
  border:1px solid #ddd;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
  min-height:380px;
}

.product-card img{
  width:100%;
  height:260px;
  object-fit:cover;
  display:block;
  background:#f5f5f5;
}

.product-card h3{
  padding:10px 15px 0;
  font-size:13px;
  line-height:18px;
  min-height:40px;
}

.product-card p{
  padding:0 15px 15px;
  font-size:14px;
  font-weight:bold;
}

.product-card h3{
  font-size:15px;
  margin:12px 0 8px;
  text-transform:uppercase;
}

.product-card p{
  font-size:15px;
  color:#8b5e34;
  font-weight:bold;
  margin:0 0 10px;
}
.image-box{
  width:100%;
  height:260px;
  background:#f5f5f5;
  display:flex;
  align-items:center;
  justify-content:center;
}
.image-box img{
  width:50%;
  height:260px;
  object-fit:cover;
  display:block;
}

@media(max-width:900px){
  .catalogue{
    width:92%;
  }

  .products{
    grid-template-columns:repeat(2,1fr);
  }

  .top-filter{
    flex-wrap:wrap;
  }

  .sort-area{
    margin-left:0;
  }
}
</style>
</head>

</div>

<div class="chips" id="chips"></div>

<div class="products" id="products"></div>

  products.push({
    name:"Produit " + n,
    price:100 + ((n * 20) % 500),
    image:"images/p" + ((n % 8) + 1) + ".jpg",
    link:"produit1.html",
    stock:true
  });
}

function toggleDropdown(id){
  document.querySelectorAll(".dropdown").forEach(menu => {
    if(menu.id !== id){
      menu.classList.remove("active");
    }
  });

  document.getElementById(id).classList.toggle("active");
}

document.addEventListener("click", function(e){
  if(!e.target.closest(".filter-box")){
    document.querySelectorAll(".dropdown").forEach(menu => {
      menu.classList.remove("active");
    });
  }
});

function displayProducts(list){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(product => {
    container.innerHTML += `
      <div class="product-card" onclick="window.location.href='${product.link}'">
        <div class="image-box">
  <img src="${product.image}" alt="${product.name}">
</div>
        <h3>${product.name}</h3>
        <p>${product.price}.00 dh</p>
      </div>
    `;
  });

  document.getElementById("count").innerText =
    list.length + " produits sur " + products.length;

  document.getElementById("stockNumber").innerText =
    "(" + list.length + ")";
}

function filterProducts(){
  let min = Number(document.getElementById("minPrice").value) || 0;
  let max = Number(document.getElementById("maxPrice").value) || 600;
  let sort = document.getElementById("sortSelect").value;

  let filtered = products.filter(product => {
    return product.price >= min && product.price <= max;
  });

  if(sort === "az"){
    filtered.sort((a,b) => a.name.localeCompare(b.name));
  }

  if(sort === "za"){
    filtered.sort((a,b) => b.name.localeCompare(a.name));
  }

  if(sort === "low"){
    filtered.sort((a,b) => a.price - b.price);
  }

  if(sort === "high"){
    filtered.sort((a,b) => b.price - a.price);
  }

  displayProducts(filtered);
  showChips(min, max);
}

function showChips(min, max){
  const chips = document.getElementById("chips");
  chips.innerHTML = "";

  if(min > 0 || max < 600){
    chips.innerHTML = `
      <div class="chip">
        ${min}.00 dh - ${max}.00 dh
        <button onclick="resetPrice()">×</button>
      </div>

      <span class="clear-all" onclick="resetPrice()">Tout supprimer</span>
    `;
  }
}

function resetPrice(){
  document.getElementById("minPrice").value = "";
  document.getElementById("maxPrice").value = "";

  document.getElementById("chips").innerHTML = "";

  displayProducts(products);
}
