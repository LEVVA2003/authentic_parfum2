<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>M&M PARFUM</title>

  <style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
  background:#f9f9f9;
  color:#333;
}

/* HEADER */
.top-header{
  width:100%;
  height:120px;
  background:white;
  border-bottom:1px solid #eee;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  padding:25px 70px;
  position:relative;
}

.search-icon{
  font-size:24px;
  cursor:pointer;
  width:80px;
}

.center-header{
  position:absolute;
  left:50%;
  top:12px;
  transform:translateX(-50%);
  text-align:center;
}

.logo{
  width:200px;
  height:auto;
  display:block;
  margin:0 auto 12px;
}

.main-nav{
  display:flex;
  justify-content:center;
  gap:25px;
}

.main-nav a{
  text-decoration:none;
  color:#555;
  font-size:14px;
  font-weight:500;
}

.main-nav a:hover{
  color:#000;
}

.cart-icon{
  font-size:24px;
  cursor:pointer;
  position:relative;
  z-index:1000;
  display:flex;
  align-items:center;
  gap:4px;
}

.cart-icon span{
  background:#333;
  color:white;
  border-radius:50%;
  padding:2px 7px;
  font-size:13px;
}

/* PRODUCT PAGE */
.product-page{
  max-width:1200px;
  margin:auto;
  padding:70px 60px;
  display:flex;
  gap:80px;
  align-items:center;
}

.product-image img{
  width:450px;
  height:550px;
  object-fit:cover;
  border-radius:20px;
}

.product-info{
  flex:1;
}

.product-info p:first-child{
  color:gray;
  letter-spacing:2px;
}

.product-info h1{
  font-size:50px;
  margin:15px 0;
}

.price{
  font-size:28px;
  color:#b8860b;
  font-weight:bold;
}

.quantity{
  display:flex;
  align-items:center;
  gap:20px;
  border:1px solid #ccc;
  width:140px;
  justify-content:center;
  padding:10px;
  border-radius:30px;
  margin:20px 0;
}

.quantity button{
  border:none;
  background:none;
  cursor:pointer;
  font-size:20px;
}

.cart-btn,
.buy-btn{
  width:350px;
  padding:15px;
  border-radius:30px;
  cursor:pointer;
  font-size:16px;
}

.cart-btn{
  background:white;
  border:1px solid #ccc;
}

.buy-btn{
  margin-top:10px;
  background:black;
  color:white;
  border:none;
}

/* CART SIDEBAR */
.cart-sidebar{
  position:fixed;
  top:0;
  right:-420px;
  width:380px;
  height:100vh;
  background:white;
  z-index:9999;
  padding:25px;
  box-shadow:-5px 0 20px rgba(0,0,0,0.15);
  transition:0.3s ease;
}

.cart-sidebar.active{
  right:0;
}

.close-cart{
  position:absolute;
  top:20px;
  right:20px;
  border:none;
  background:none;
  font-size:30px;
  cursor:pointer;
}

.cart-sidebar h2{
  margin-right:50px;
}

.cart-item{
  display:flex;
  gap:15px;
  margin-top:25px;
}

.cart-item img{
  width:90px;
  height:110px;
  object-fit:cover;
}

.cart-item h3{
  font-size:16px;
  margin:0;
}

.cart-item p{
  margin:6px 0;
}

.cart-bottom{
  position:absolute;
  bottom:25px;
  left:25px;
  right:25px;
}

.cart-total{
  display:flex;
  justify-content:space-between;
  border-top:1px solid #ddd;
  padding-top:20px;
}

.checkout-btn{
  width:100%;
  padding:15px;
  background:#222;
  color:white;
  border:none;
  margin-top:15px;
  cursor:pointer;
}

/* RECOMMENDATIONS */
.recommendations{
  max-width:1200px;
  margin:50px auto;
  padding:20px;
}

.recommendations h2{
  margin-bottom:25px;
}

.cards{
  display:flex;
  gap:25px;
}

.card{
  width:250px;
  border:1px solid #ddd;
  border-radius:15px;
  overflow:hidden;
  background:white;
  text-decoration:none;
  color:black;
  display:block;
}
#cart-items{
  max-height: calc(100vh - 220px);
  overflow-y: auto;
  padding-right: 10px;
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.card h3{
  padding:10px;
  font-size:16px;
}

.card p{
  padding:0 10px 15px;
  color:#b8860b;
}
.note-image img{
  width: 100%;
  height: auto;
  border-radius: 12px;
  object-fit: cover;
  display: block;
}
.product-section{
  margin-top: 25px;
  padding-top: 10px;
  display: block;
}

.product-section h3{
  margin-bottom: 15px;
  font-size: 16px;
  font-weight: 600;
}
.product-info-box{
  display: flex;
  flex-direction: column;
  gap: 18px;
  max-width: 450px;
}

.product-title{
  margin-bottom: 10px;
}

.product-price{
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 10px;
}

.product-actions{
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.add-cart, .buy-now{
  padding: 14px;
  border-radius: 12px;
}
.notes-section{
  text-align:center;
  margin:20px auto;
}

.notes-section h3{
  margin-bottom:20px;
}

.notes-full{
  width:70%;
  max-width:700px;
  border-radius:15px;
}
@media (max-width: 768px) {
  body{
    font-size: 14px;
  }

  /* ===== الهيدر ===== */
  .top-header{
    flex-direction: row;
    padding: 15px 20px;
    height: auto;
  }

  .center-header{
    text-align: center;
  }

  .logo{
    width: 140px;
  }

  /* ===== صفحة المنتج ===== */
  .product-page{
    width: 100%;
    flex-direction: column;
    padding: 20px;
    gap: 20px;
  }

  .product-image img{
    height: auto;
  }

  .product-info h1{
    font-size: 28px;
  }

  .cart-btn,
  .buy-btn{
    width: 100%;
  }

  /* ===== السلة ===== */
  .cart-sidebar{
    width: 100%;
    right: -100%;
  }

  .cart-sidebar.active{
    right: 0;
  }

  /* ===== checkout modal ===== */
  #checkout-modal{
    width: 95%;
    margin: 20px auto;
  }

  /* ===== الأزرار ===== */
  button{
    font-size: 14px;
  }
}
@media (max-width: 768px) {
  .search-icon,
  .cart-icon {
    font-size: 20px;
  }

  .main-nav {
    gap: 10px;
  }

  .main-nav a {
    font-size: 12px;
  }
}

</style>
</head>

<body>

<header class="top-header">

  <div class="center-header">
    <img src="banner and logo/Gemini_Generated_Image_9c35ot9c35ot9c35.gif" class="logo" alt="logo">

    <nav class="main-nav">
      <a href="contact.html">Contact</a>
      <a href="catalogue.html">Catalogue</a>
      <a href="index.html">Accueil</a>
    </nav>
  </div>

  <div class="cart-icon" onclick="openCart()">
    🛒
    <span id="cart-count">0</span>
  </div>

</header>

<section class="product-page">

  <div class="product-image">
    <img src="femme parfum/Ana-Abiyedh-Coral-1_41d503d3-7e8c-47d3-812a-93234a679648.webp">
  </div>

  <div class="product-info">

    <p>M&M PARFUM</p>
    <h1>ana abiyedh</h1>

    <p class="price">160DH</p>

    <label>Quantité</label>


    <div class="quantity">
      <button onclick="decreaseQty()">-</button>
      <span id="qty">1</span>
      <button onclick="increaseQty()">+</button>
    </div>
   


    <button class="cart-btn" onclick="addToCart(); openCart();">
      Ajouter au panier
    </button>

    <br>
</section>

<!-- NOTES (CENTRÉES PROPREMENT) -->
<div class="notes-section">
  <h3>Parfum Notes & Information</h3>
  <img class="notes-full" src="catalogue femme parfums/IMG-20260622-WA0039.jpg">
</div>

<div class="cart-sidebar" id="cart-sidebar">
  <button class="close-cart" onclick="closeCart()">×</button>

  <h2>Votre panier</h2>

  <div id="cart-items"></div>

  <div class="cart-bottom">
    <div class="cart-total">
      <strong>Total estimé</strong>
      <span id="cart-total">0 DH</span>
    </div>

    <button class="checkout-btn" onclick="openCheckout()">
  ACHETER MAINTENANT
</button>
</div>

<section class="recommendations">
   

 
</section>

<script>
let quantity = 1;

function increaseQty(){
  quantity++;
  document.getElementById("qty").textContent = quantity;
}

function decreaseQty(){
  if(quantity > 1){
    quantity--;
    document.getElementById("qty").textContent = quantity;
  }
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(){
  let product = {
    name: "ana abiyedh",
    price: 160,
    image: "femme parfum/Ana-Abiyedh-Coral-1_41d503d3-7e8c-47d3-812a-93234a679648.webp",
    quantity: quantity
  };

  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
  openCart();
}

function updateCart(){
  let cartItems = document.getElementById("cart-items");
  let cartCount = document.getElementById("cart-count");
  let cartTotal = document.getElementById("cart-total");

  cartItems.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach((item, index) => {
    total += item.price * item.quantity;
    count += item.quantity;

    cartItems.innerHTML += `
      <div class="cart-item">
        <img src="${item.image}">
        <div>
          <h3>${item.name}</h3>
          <p>${item.price} DH</p>
          <p>Quantité: ${item.quantity}</p>
          <button onclick="removeItem(${index})">🗑️</button>
        </div>
      </div>
    `;
  });

  cartCount.textContent = count;
  cartTotal.textContent = total + " DH";
}

function removeItem(index){
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function openCart(){
  document.getElementById("cart-sidebar").classList.add("active");
}

function closeCart(){
  document.getElementById("cart-sidebar").classList.remove("active");
}

updateCart();
function openCheckout(){
  document.getElementById("checkout-modal").style.display = "block";

  renderCheckout();
}

function closeCheckout(){
  document.getElementById("checkout-modal").style.display = "none";
}

function renderCheckout(){
  let box = document.getElementById("checkout-products");
  let totalBox = document.getElementById("checkout-total");

  box.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    total += item.price * item.quantity;

    box.innerHTML += `
      <div style="margin-bottom:10px;">
        <strong>${item.name}</strong><br>
        <span>${item.price} DH × ${item.quantity}</span>
      </div>
    `;
  });

  totalBox.textContent = "Total: " + total + " DH";
}
function sendOrder(){

  let orderData = {
    name: document.getElementById("c_name").value,
    phone: document.getElementById("c_phone").value,
    address: document.getElementById("c_address").value,
    city: document.getElementById("c_city").value,
    cart: cart
  };

  fetch("order.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(orderData)
  })
  .then(res => res.json())
  .then(data => {

    alert("Commande envoyée avec succès !");

    cart = [];
    localStorage.removeItem("cart");
    updateCart();
    closeCheckout();

  })
  .catch(err => {
    alert("Erreur lors de l'envoi");
    console.log(err);
  });
}
</script>
<div id="checkout-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:99999;">

  <div style="background:#fff; width:420px; max-height:90vh; overflow:auto; margin:40px auto; padding:20px; position:relative; border-radius:10px;">

    <button onclick="closeCheckout()" style="position:absolute; right:15px; top:10px; font-size:20px; border:none; background:none; cursor:pointer;">✕</button>

    <h3>Finaliser la commande</h3>
      <h3>(livraison au casablanca 20dh)</h3>
    <h3>(livraison hors casablanca 30dh)</h3>

    <!-- FORMULAIRE -->
    <input id="c_name" placeholder="Nom complet" style="width:100%; margin:8px 0; padding:10px;">
    <input id="c_phone" placeholder="Numéro" style="width:100%; margin:8px 0; padding:10px;">
    <input id="c_address" placeholder="Adresse" style="width:100%; margin:8px 0; padding:10px;">
    <input id="c_city" placeholder="Ville" style="width:100%; margin:8px 0; padding:10px;">

    <hr style="margin:15px 0;">

    <!-- PRODUITS DYNAMIQUES -->
    <div id="checkout-products"></div>

    <hr>

    <p id="checkout-total" style="font-weight:bold;"></p>

    <button onclick="sendOrder()" style="width:100%; padding:12px; background:#222; color:white; border:none; margin-top:10px;">
      Confirmer la commande
    </button>

  </div>
</div>
</body>
</html>
